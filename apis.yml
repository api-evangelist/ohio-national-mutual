aid: ohio-national-mutual
name: Ohio National (Acquired by Constellation Insurance / Rebranded as AuguStar)
description: >-
  Ohio National Financial Services was a Cincinnati-based mutual life insurance
  and annuities provider, historically operating through Ohio National Mutual
  Holdings, Inc. (ONMH). In March 2021 Constellation Insurance Holdings
  announced a sponsored demutualization of ONMH and Ohio National Financial
  Services for total consideration of approximately US$1 billion, including
  member consideration and new capital. The transaction closed on March 31,
  2022, after a member vote on March 11, 2022, converting ONMH to a stock
  company renamed Ohio National Holdings, Inc. On July 17, 2023 Constellation
  repositioned and rebranded Ohio National's life insurance business as
  AuguStar Life, with the Ohio National Life Insurance Company and Ohio
  National Life Assurance Corporation expected to change their names to
  AuguStar Life Insurance Company and AuguStar Life Assurance Corporation in
  Q4 2023. Constellation Insurance is owned by long-term institutional
  investors CDPQ (Caisse de dépôt et placement du Québec) and Ontario
  Teachers' Pension Plan, and Constellation's family of insurance companies
  collectively held over US$34 billion in assets under management as of
  December 31, 2022. The product surface remains traditional life insurance,
  indexed life, and annuities distributed through agents and independent
  marketing organizations; no public developer APIs or OpenAPI specs are
  published.
